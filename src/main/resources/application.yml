server:
  port: 8086

spring:
  application:
    name: pyokemon-bff
  webflux:
    base-path: /bff
  config:
    activate:
      on-profile: default
    import:
      - optional:file:./config/application.yml
  # Redis 설정
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

logging:
  config: classpath:log4j2.yml
  level:
    com.pyokemon: DEBUG
    org.springframework: INFO

external:
  services:
    booking-service: http://localhost:8088
    event-service: http://localhost:8081
    account-service: http://localhost:8080
    payment-service: http://localhost:8082

webclient:
  connect-timeout: 5000
  response-timeout: 5000
  read-timeout: 5000
  write-timeout: 5000
  max-in-memory-size: 2097152

seat:
  hold:
    ttl: 300

---
spring:
  config:
    activate:
      on-profile: dev
    import:
      - classpath:dev-config.yml
